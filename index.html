<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin: Scientific Data Repository</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Dashboard -->
    <nav class="dashboard">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="8" fill="#1a1f3a"/>
                        <circle cx="50" cy="50" r="20" fill="none" stroke="url(#gradient1)" stroke-width="1.5"/>
                        <path d="M 30 30 Q 50 50, 70 70" fill="none" stroke="url(#gradient2)" stroke-width="2"/>
                        <defs>
                            <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c1121f;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c1121f;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">Spin</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Search</a>
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="create-post.html" class="nav-link">Create Post</a>
                <a href="signup.html" class="nav-link">Sign Up</a>
                <a href="login.html" class="nav-link" id="nav-login-link">Login</a>
                <a href="#" class="nav-link" id="nav-profile-link" style="display: none;">Profile</a>
                <a href="#" class="nav-link" id="nav-logout-link" style="display: none;">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="hero-section">
            <h1 class="hero-title">Spin: Scientific Data Repository</h1>
            <p class="hero-subtitle">Discover, share, and collaborate on scientific research data across all disciplines</p>
            
            <!-- Search Console -->
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="main-search" class="search-input" placeholder="Search datasets, methods, publications...">
                    <button class="search-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Advanced Search Panel -->
                <div class="advanced-search-toggle">
                    <button id="advanced-toggle" class="toggle-btn">
                        <span>Advanced Search</span>
                        <svg id="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </div>
                
                <div id="advanced-panel" class="advanced-panel hidden">
                    <div class="advanced-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="field-of-study">Field of Study</label>
                                <select id="field-of-study" class="form-input">
                                    <option value="">All Fields</option>
                                    <option value="biology">Biology</option>
                                    <option value="geospatial">Geospatial</option>
                                    <option value="lidar">LIDAR</option>
                                    <option value="video">Video Analysis</option>
                                    <option value="chemistry">Chemistry</option>
                                    <option value="physics">Physics</option>
                                    <option value="engineering">Engineering</option>
                                    <option value="environmental">Environmental Science</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="subtopic">Subtopic</label>
                                <input type="text" id="subtopic" class="form-input" placeholder="e.g., genomics, climate modeling">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="publication-date-from">Publication Date (From)</label>
                                <input type="date" id="publication-date-from" class="form-input">
                            </div>
                            <div class="form-group">
                                <label for="publication-date-to">Publication Date (To)</label>
                                <input type="date" id="publication-date-to" class="form-input">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="author">Author</label>
                                <input type="text" id="author" class="form-input" placeholder="Author name">
                            </div>
                            <div class="form-group">
                                <label for="author-institution">Author Institution</label>
                                <input type="text" id="author-institution" class="form-input" placeholder="Institution name">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="organisms">Organisms</label>
                                <input type="text" id="organisms" class="form-input" placeholder="e.g., Homo sapiens, Arabidopsis">
                            </div>
                            <div class="form-group">
                                <label for="methods">Methods</label>
                                <input type="text" id="methods" class="form-input" placeholder="e.g., RNA-seq, CRISPR">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="data-type">Data Type</label>
                                <select id="data-type" class="form-input">
                                    <option value="">All Types</option>
                                    <option value="genomic">Genomic</option>
                                    <option value="geospatial">Geospatial</option>
                                    <option value="lidar">LIDAR</option>
                                    <option value="video">Video</option>
                                    <option value="imaging">Imaging</option>
                                    <option value="spectroscopy">Spectroscopy</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="tags">Tags</label>
                                <input type="text" id="tags" class="form-input" placeholder="Comma-separated tags">
                            </div>
                        </div>
                        
                        <div class="advanced-actions">
                            <button class="btn-secondary" id="clear-advanced">Clear</button>
                            <button class="btn-primary" id="apply-advanced">Apply Filters</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-number">12,847</div>
                <div class="stat-label">Datasets</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">3,241</div>
                <div class="stat-label">Researchers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">156</div>
                <div class="stat-label">Institutions</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">28</div>
                <div class="stat-label">Countries</div>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
