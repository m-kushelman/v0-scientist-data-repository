<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Spin: Scientific Data Repository</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Dashboard -->
    <nav class="dashboard">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="8" fill="#1a1f3a"/>
                        <circle cx="50" cy="50" r="20" fill="none" stroke="url(#gradient1)" stroke-width="1.5"/>
                        <path d="M 30 30 Q 50 50, 70 70" fill="none" stroke="url(#gradient2)" stroke-width="2"/>
                        <defs>
                            <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c1121f;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c1121f;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">Spin</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Search</a>
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="signup.html" class="nav-link">Sign Up</a>
                <a href="login.html" class="nav-link">Login</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="signup-container">
            <div class="signup-header">
                <h1 class="page-title">Verify Your Email</h1>
            </div>

            <div id="verification-status" class="verification-container">
                <div class="loading-spinner" id="loading-spinner">
                    <div class="spinner"></div>
                    <p>Verifying your email address...</p>
                </div>
                <div id="verification-result" style="display: none;">
                    <!-- Result will be shown here -->
                </div>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const loadingSpinner = document.getElementById('loading-spinner');
            const resultDiv = document.getElementById('verification-result');

            if (!token) {
                loadingSpinner.style.display = 'none';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div class="error-message">
                        <h2>Invalid Verification Link</h2>
                        <p>No verification token provided. Please check your email and use the link provided.</p>
                        <a href="index.html" class="btn-primary" style="display: inline-block; margin-top: 1rem;">Go to Home</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/verify-email?token=${token}`);
                const data = await response.json();

                loadingSpinner.style.display = 'none';
                resultDiv.style.display = 'block';

                if (response.ok && data.verified) {
                    resultDiv.innerHTML = `
                        <div class="success-message" style="text-align: center; padding: 3rem;">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" style="margin-bottom: 1rem;">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                            <h2 style="color: #22c55e; margin-bottom: 1rem;">Email Verified Successfully!</h2>
                            <p style="margin-bottom: 2rem;">Your email address has been verified. You can now log in to your account.</p>
                            <a href="login.html" class="btn-primary btn-large">Go to Login</a>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error-message" style="text-align: center; padding: 3rem;">
                            <h2>Verification Failed</h2>
                            <p style="margin-bottom: 1rem;">${data.error || 'Unable to verify email address'}</p>
                            ${data.error && data.error.includes('expired') ? `
                                <p>You can request a new verification email by logging in or contacting support.</p>
                                <div style="margin-top: 2rem;">
                                    <a href="login.html" class="btn-primary" style="display: inline-block; margin-right: 1rem;">Go to Login</a>
                                    <button id="resend-btn" class="btn-secondary">Resend Verification Email</button>
                                </div>
                            ` : `
                                <a href="index.html" class="btn-primary" style="display: inline-block; margin-top: 1rem;">Go to Home</a>
                            `}
                        </div>
                    `;

                    // Add resend functionality if needed
                    const resendBtn = document.getElementById('resend-btn');
                    if (resendBtn) {
                        resendBtn.addEventListener('click', async function() {
                            const email = prompt('Please enter your email address:');
                            if (email) {
                                try {
                                    const resendResponse = await fetch(`${API_BASE_URL}/resend-verification`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ email })
                                    });
                                    const resendData = await resendResponse.json();
                                    if (resendResponse.ok) {
                                        alert('Verification email sent! Please check your inbox.');
                                    } else {
                                        alert(resendData.error || 'Failed to send verification email');
                                    }
                                } catch (error) {
                                    alert('Failed to send verification email. Please try again later.');
                                }
                            }
                        });
                    }
                }
            } catch (error) {
                loadingSpinner.style.display = 'none';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div class="error-message" style="text-align: center; padding: 3rem;">
                        <h2>Verification Error</h2>
                        <p>An error occurred while verifying your email. Please try again later.</p>
                        <a href="index.html" class="btn-primary" style="display: inline-block; margin-top: 1rem;">Go to Home</a>
                    </div>
                `;
            }
        });
    </script>
    <style>
        .verification-container {
            background: var(--background-white);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .loading-spinner {
            padding: 3rem;
        }
        .spinner {
            border: 4px solid var(--border-light);
            border-top: 4px solid var(--orange);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
